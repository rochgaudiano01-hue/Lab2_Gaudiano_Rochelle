<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Page</title>
</head>
<body>

    <!-- Header with Your Name -->
    <header>
        <h1>Rochelle Gaudiano</h1>
    </header>

    <!-- Navigation -->
    <nav>
        <ul>
            <li><a href="#home">Home</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>

    <!-- Section with Article About Yourself -->
    <section>
        <article>
            <h2>About Me</h2>
            <p>Hello! My name is Rochelle Gaudiano, and I am learning HTML and web development. I enjoy creating websites and exploring new technologies.</p>
            <!-- Added image with alt text -->
            <img src="profile.jpg" alt="Profile picture of Rochelle Gaudiano" />
        </article>
    </section>

    <!-- Registration Form -->
    <section>
        <h2>Registration Form</h2>
        <form action="#" method="post">
            <div>
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>
            </div>

            <div>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div>
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>
            </div>

            <div>
                <label for="dob">Date of Birth:</label>
                <input type="date" id="dob" name="dob">
            </div>

            <div>
                <label for="phone">Phone Number:</label>
                <input type="number" id="phone" name="phone" placeholder="Optional">
            </div>

            <button type="submit">Submit</button>
        </form>
    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 Rochelle Gaudiano. All rights reserved.</p>
    </footer>

</body>
</html>
<link rel="stylesheet" href="styles.css" />
